<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Polyhouse Smart Control</title>
  <script src="https://jsdelivr.net"></script>
    <style>
        :root { --primary: #2ecc71; --danger: #e74c3c; --dark: #2c3e50; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f0f2f5; margin: 0; padding: 20px; color: var(--dark); }
        .container { max-width: 900px; margin: auto; }
        
        /* Status Cards */
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); text-align: center; }
        .card h3 { margin: 0; font-size: 0.9rem; color: #7f8c8d; text-transform: uppercase; }
        .card p { font-size: 1.8rem; font-weight: bold; margin: 10px 0 0; color: var(--dark); }

        /* Control Buttons */
        .controls { background: white; padding: 20px; border-radius: 12px; margin-bottom: 30px; display: flex; justify-content: space-around; flex-wrap: wrap; }
        .btn { padding: 12px 24px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.3s; margin: 5px; }
        .btn-on { background: var(--primary); color: white; }
        .btn-off { background: var(--danger); color: white; }
        .btn:hover { opacity: 0.8; transform: translateY(-2px); }

        /* Chart Area */
        .chart-container { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
    </style>
</head>
<body>

<div class="container">
    <h1>🌿 Polyhouse Monitor & Control</h1>

    <!-- Live Status -->
    <div class="grid">
        <div class="card">
            <h3>Temperature</h3>
            <p id="temp">--°C</p>
        </div>
        <div class="card">
            <h3>Soil Moisture</h3>
            <p id="moisture">--%</p>
        </div>
        <div class="card">
            <h3>Fan Status</h3>
            <p id="fan-state" style="color: var(--danger);">OFF</p>
        </div>
        <div class="card">
            <h3>Pump Status</h3>
            <p id="pump-state" style="color: var(--danger);">OFF</p>
        </div>
    </div>

    <!-- Manual Controls -->
    <div class="controls">
        <div>
            <h4>Exhaust Fan</h4>
            <button class="btn btn-on" onclick="controlDevice('fan', true)">ON</button>
            <button class="btn btn-off" onclick="controlDevice('fan', false)">OFF</button>
        </div>
        <div>
            <h4>Water Pump</h4>
            <button class="btn btn-on" onclick="controlDevice('pump', true)">ON</button>
            <button class="btn btn-off" onclick="controlDevice('pump', false)">OFF</button>
        </div>
    </div>

    <!-- Graph -->
    <div class="chart-container">
        <canvas id="polyChart"></canvas>
    </div>
</div>

<script>
    const ctx = document.getElementById('polyChart').getContext('2d');
    const chart = new Chart(ctx, {
        type: 'line',
        data: {
            labels: [],
            datasets: [
                { label: 'Temp (°C)', borderColor: '#e74c3c', data: [], tension: 0.3 },
                { label: 'Moisture (%)', borderColor: '#3498db', data: [], tension: 0.3 }
            ]
        }
    });

    async function updateDashboard() {
        try {
            // Fetch history from your Render Backend
            const res = await fetch('/history');
            const data = await res.json();
            if (data.length === 0) return;

            const latest = data[0];
            
            // Update Live Cards
            document.getElementById('temp').innerText = latest.temperature + "°C";
            document.getElementById('moisture').innerText = latest.soil_moisture + "%";
            
            // Update Chart
            chart.data.labels = data.map(d => new Date(d.recorded_at).toLocaleTimeString()).reverse();
            chart.data.datasets[0].data = data.map(d => d.temperature).reverse();
            chart.data.datasets[1].data = data.map(d => d.soil_moisture).reverse();
            chart.update();
        } catch (e) { console.log("Error fetching data"); }
    }

    async function controlDevice(device, status) {
        await fetch('/toggle-device', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ device, status })
        });
        // Visual feedback
        document.getElementById(`${device}-state`).innerText = status ? "ON" : "OFF";
        document.getElementById(`${device}-state`).style.color = status ? "#2ecc71" : "#e74c3c";
    }

    // Refresh data every 10 seconds
    setInterval(updateDashboard, 10000);
    updateDashboard();
</script>

</body>
</html>
